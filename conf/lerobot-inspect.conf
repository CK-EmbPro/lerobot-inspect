# shellcheck shell=bash disable=SC2034
# (SC2034: values here are read by the tool at runtime, not within this file.)
# Default configuration for lerobot-inspect.
#
# This file is sourced by the tool at startup. Every value here is a DEFAULT
# that can be overridden, in increasing order of precedence, by:
#   1. this file
#   2. an environment variable of the same name (LEROBOT_INSPECT_*)
#   3. a command-line flag
#
# Keeping tolerances and limits here — never inline in the code — is what the
# brief means by "no magic numbers".

# Absolute tolerance for statistical validation (check 11): recomputed
# mean/std/min/max must be within this of the stored value. Datasets that store
# rounded stats need a looser value; tighten with --tolerance for strict audits.
LEROBOT_INSPECT_TOLERANCE="${LEROBOT_INSPECT_TOLERANCE:-0.01}"

# Fallback tolerance in SECONDS for the empirical-vs-declared fps check
# (check 10) when a dataset's info.json does not carry recommended_tolerance_s.
LEROBOT_INSPECT_FPS_TOLERANCE_S="${LEROBOT_INSPECT_FPS_TOLERANCE_S:-0.04}"

# Relative tolerance for the empirical-vs-declared frame rate (check 10). The
# per-frame LEROBOT_INSPECT_FPS_TOLERANCE_S catches fine jitter but is lenient on
# gross rate errors; this fractional bound flags an average fps that is off by
# more than, e.g., 10% from the declared value.
LEROBOT_INSPECT_FPS_REL_TOL="${LEROBOT_INSPECT_FPS_REL_TOL:-0.10}"

# Batch concurrency (check 13): how many datasets to inspect in parallel.
# Empty means "auto" — resolved to the CPU count at runtime.
LEROBOT_INSPECT_JOBS="${LEROBOT_INSPECT_JOBS:-}"

# Video frame-count strategy (check 7):
#   fast  -> read nb_frames from the container header (≈12x faster)
#   exact -> decode every packet with ffprobe -count_frames (authoritative)
# fast falls back to exact automatically when the header count is missing.
LEROBOT_INSPECT_FRAME_MODE="${LEROBOT_INSPECT_FRAME_MODE:-fast}"

# Relative spread threshold for cross-dataset anomaly flagging in batch mode
# (check 13): a numeric attribute (fps, mean episode length) whose value deviates
# from the batch median by more than this fraction is flagged as an outlier.
LEROBOT_INSPECT_OUTLIER_RATIO="${LEROBOT_INSPECT_OUTLIER_RATIO:-0.25}"

# --- Results persistence -----------------------------------------------------
# Every run also writes its report under RESULTS_DIR (in addition to the terminal
# output): BOTH run_<timestamp>.md and run_<timestamp>.json — two views of the
# same data. The --json flag only changes the terminal output, not what is saved.
# Set SAVE_RESULTS=false, or pass --no-save, to disable.
LEROBOT_INSPECT_RESULTS_DIR="${LEROBOT_INSPECT_RESULTS_DIR:-results}"
LEROBOT_INSPECT_SAVE_RESULTS="${LEROBOT_INSPECT_SAVE_RESULTS:-true}"

# Also write an annotated companion, run_<timestamp>_explanation.md, that
# explains the report the way first_run.md does. Set false / --no-explanation
# to skip it. (Always markdown, even when the report itself is JSON.)
LEROBOT_INSPECT_WRITE_EXPLANATION="${LEROBOT_INSPECT_WRITE_EXPLANATION:-true}"

# strftime pattern for the run timestamp in filenames — date(1) syntax, 24-hour.
# Default: run_DD-MM-YYYY_HH-MM-SS. Use %Y-%m-%d... if you prefer chronological
# sorting in the folder.
LEROBOT_INSPECT_TIMESTAMP_FMT="${LEROBOT_INSPECT_TIMESTAMP_FMT:-%d-%m-%Y_%H-%M-%S}"

# --- Explanatory-file content (structure lives here, so it is configurable) ---
# Prepended intro for run_<timestamp>_explanation.md: how to read the report.
LEROBOT_INSPECT_EXPLAIN_INTRO="${LEROBOT_INSPECT_EXPLAIN_INTRO:-$'This file annotates the run above it. Each dataset is verified by five integrity\nchecks; a status marker precedes every one:\n\n- **ok**   — the check passed.\n- **warn** — a data-quality issue (e.g. dropped-frame gaps); the dataset still\n  PASSes unless you run with --strict.\n- **fail** — a real integrity failure; any fail makes the dataset FAIL.\n\nA dataset PASSes unless a check fails (or a warn under --strict). The process\nexit code is the worst outcome across all datasets: 0 ok, 1 warnings,\n2 integrity failure, 3 usage error, 4 missing dependency.'}"

# One sentence per check explaining what it verifies. Consumed by the explainer;
# edit freely to change how runs are explained.
declare -gA LEROBOT_INSPECT_CHECK_DOC=(
    [metadata_consistency]="Reconciles the declared total_* fields and the train split in info.json against episodes.jsonl, tasks.jsonl, the camera list, and the chunk directories. A failure means a declared count disagrees with what is actually on disk."
    [file_accounting]="Expands the data_path/video_path templates with chunk math to compute exactly which files should exist, then reports missing (referenced but absent) and orphan (present but unreferenced, e.g. a file in the wrong chunk) files."
    [cross_modal_consistency]="For every episode, checks that the parquet row count, the episodes.jsonl length, and each camera mp4 frame count all agree. A mismatch localizes a dropped frame, a short/corrupt parquet, or a bad video to the exact episode."
    [temporal_integrity]="Verifies timestamps rise monotonically (a failure is corruption) and that the empirical frame rate matches the declared fps, flagging large inter-frame gaps as probable dropped frames (a warning)."
    [statistical_validation]="Recomputes min/max/mean/std for observation.state and action directly from the parquet and diffs them against the stored stats within tolerance. A deviation means a tampered or stale statistic."
)
