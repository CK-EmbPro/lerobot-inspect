# shellcheck shell=bash
# Default configuration for lerobot-inspect.
#
# This file is sourced by the tool at startup. Every value here is a DEFAULT
# that can be overridden, in increasing order of precedence, by:
#   1. this file
#   2. an environment variable of the same name (LEROBOT_INSPECT_*)
#   3. a command-line flag
#
# Keeping tolerances and limits here — never inline in the code — is what the
# brief means by "no magic numbers".

# Absolute tolerance for statistical validation (check 11): recomputed
# mean/std/min/max must be within this of the stored value. Datasets that store
# rounded stats need a looser value; tighten with --tolerance for strict audits.
LEROBOT_INSPECT_TOLERANCE="${LEROBOT_INSPECT_TOLERANCE:-0.01}"

# Fallback tolerance in SECONDS for the empirical-vs-declared fps check
# (check 10) when a dataset's info.json does not carry recommended_tolerance_s.
LEROBOT_INSPECT_FPS_TOLERANCE_S="${LEROBOT_INSPECT_FPS_TOLERANCE_S:-0.04}"

# Relative tolerance for the empirical-vs-declared frame rate (check 10). The
# per-frame LEROBOT_INSPECT_FPS_TOLERANCE_S catches fine jitter but is lenient on
# gross rate errors; this fractional bound flags an average fps that is off by
# more than, e.g., 10% from the declared value.
LEROBOT_INSPECT_FPS_REL_TOL="${LEROBOT_INSPECT_FPS_REL_TOL:-0.10}"

# Batch concurrency (check 13): how many datasets to inspect in parallel.
# Empty means "auto" — resolved to the CPU count at runtime.
LEROBOT_INSPECT_JOBS="${LEROBOT_INSPECT_JOBS:-}"

# Video frame-count strategy (check 7):
#   fast  -> read nb_frames from the container header (≈12x faster)
#   exact -> decode every packet with ffprobe -count_frames (authoritative)
# fast falls back to exact automatically when the header count is missing.
LEROBOT_INSPECT_FRAME_MODE="${LEROBOT_INSPECT_FRAME_MODE:-fast}"

# Relative spread threshold for cross-dataset anomaly flagging in batch mode
# (check 13): a numeric attribute (fps, mean episode length) whose value deviates
# from the batch median by more than this fraction is flagged as an outlier.
LEROBOT_INSPECT_OUTLIER_RATIO="${LEROBOT_INSPECT_OUTLIER_RATIO:-0.25}"
